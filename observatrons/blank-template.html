<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<link rel="icon" type="image/svg+xml" href="../favicon.svg" />
<title>Blank Template · Observatron</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0a12; color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  #canvas-wrap { position: fixed; inset: 0; }

  #overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 5;
  }
  .obs-label {
    position: absolute;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }
  .obs-meta {
    position: absolute;
    font-size: 10px;
    color: rgba(155, 135, 255, 0.8);
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    letter-spacing: 0.3px;
  }

  #hint {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 14px);
    left: 14px; right: 14px;
    font-size: 10px;
    opacity: 0.5;
    z-index: 10;
    pointer-events: none;
    text-align: center;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<script src="../sidebar.js" data-active="observatrons" data-mode="dark"></script>
<div id="canvas-wrap"></div>
<div id="overlay"></div>

<div id="hint">drag to rotate the observatron</div>


<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js" } }
</script>

<script type="module" src="../js/observatrons/apps/blank-template/blank-template.js"></script>
</body>
</html>
