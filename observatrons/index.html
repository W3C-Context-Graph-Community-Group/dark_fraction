<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observatrons — Dark Fraction</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f5;
      font-family: 'JetBrains Mono', monospace;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      color: #4ECDC4;
    }
    .subtitle {
      color: #999;
      font-size: 13px;
      margin-bottom: 48px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      padding: 32px 28px;
      width: 260px;
      text-decoration: none;
      color: inherit;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      border-color: #4ECDC4;
    }

    .card-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 18px;
      background: #4ECDC418;
      color: #4ECDC4;
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #4ECDC4;
    }
    .card-desc {
      font-size: 12px;
      color: #888;
      line-height: 1.6;
    }

    /* --- Sidebar --- */
    .sidebar-hamburger {
      position: fixed; top: 12px; left: 12px; z-index: 1100;
      width: 30px; height: 30px; border: none; background: #fff;
      border-radius: 6px; cursor: pointer; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.12);
    }
    .sidebar-hamburger span {
      display: block; width: 14px; height: 1.5px; background: #555;
      border-radius: 2px; transition: transform .25s, opacity .25s;
    }
    .sidebar-hamburger.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
    .sidebar-hamburger.open span:nth-child(2) { opacity: 0; }
    .sidebar-hamburger.open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

    .sidebar-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      z-index: 1000; opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }

    .sidebar-nav {
      position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
      background: #fff; z-index: 1050; padding: 72px 20px 20px;
      transform: translateX(-100%); transition: transform .25s;
      box-shadow: 2px 0 12px rgba(0,0,0,.1);
    }
    .sidebar-nav.open { transform: translateX(0); }

    .sidebar-nav a {
      display: block; padding: 12px 14px; margin-bottom: 4px;
      border-radius: 8px; text-decoration: none; color: #555;
      font-size: 14px; font-weight: 400; transition: background .15s;
    }
    .sidebar-nav a:hover { background: #f0f0f0; }
    .sidebar-nav a.active { background: #A78BFA18; color: #A78BFA; font-weight: 700; border-left: 3px solid #A78BFA; border-radius: 0 8px 8px 0; }

    .footer {
      margin-top: 48px;
      color: #bbb;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <button class="sidebar-hamburger" id="sidebarToggle" aria-label="Open navigation">
    <span></span><span></span><span></span>
  </button>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <nav class="sidebar-nav" id="sidebarNav">
    <a href="../calculator/">Calculator</a>
    <a href="../observatrons/" class="active">Observatrons</a>
    <a href="../ui-bindings/">UI Bindings</a>
  </nav>

  <h1>◎ Observatrons</h1>
  <div class="subtitle">Dark Fraction — visualizations</div>

  <div class="cards">
    <a href="sequencer.html" class="card">
      <div class="card-icon">▶</div>
      <div class="card-title">Sequencer</div>
      <div class="card-desc">Interactive CGPL node sequencer visualization.</div>
    </a>
  </div>

  <div class="footer">W3C Context Graph Community Group</div>

  <script>
  (function() {
    var btn = document.getElementById('sidebarToggle');
    var nav = document.getElementById('sidebarNav');
    var backdrop = document.getElementById('sidebarBackdrop');
    function open()  { btn.classList.add('open'); nav.classList.add('open'); backdrop.classList.add('open'); }
    function close() { btn.classList.remove('open'); nav.classList.remove('open'); backdrop.classList.remove('open'); }
    function toggle() { nav.classList.contains('open') ? close() : open(); }
    btn.addEventListener('click', toggle);
    backdrop.addEventListener('click', close);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') close(); });
  })();
  </script>
</body>
</html>
