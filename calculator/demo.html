<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <title>Dark Fraction δ — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { background: #f5f5f5; }

  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <script src="../sidebar.js" data-active="calculator"></script>

  <div id="root"></div>

  <!-- Bridge: load ES module EventBus onto window -->
  <script type="module">
    import { EventBus } from '../lib/event-bus/client.js';
    window.EventBus = EventBus;
  </script>

  <!-- Shared calculator -->
  <script type="text/babel" data-type="module" src="dark-fraction-core.js"></script>

  <!-- Demo wrapper with event bus wiring -->
  <script type="text/babel" data-type="module">
const { DarkFractionCalculator } = DFC;
const { useState, useEffect, useRef, useCallback } = React;

const STATE_URL = 'cgp:/s/calc/o/0/c/state-change';
const VARS_URL  = 'cgp:/s/calc/o/0/c/variables-changed';

function DemoApp() {
  const busRef = useRef(null);
  const [extVars, setExtVars] = useState(null);

  useEffect(() => {
    function tryConnect() {
      if (window.EventBus) {
        const bus = new window.EventBus();
        busRef.current = bus;
        bus.on(VARS_URL, (msg) => {
          if (bus.clientId && msg.from === bus.clientId) return;
          if (msg.data?.variables) setExtVars(msg.data.variables);
        });
      } else {
        setTimeout(tryConnect, 50);
      }
    }
    tryConnect();
  }, []);

  const handleStateChange = useCallback((state) => {
    busRef.current?.emit(STATE_URL, state);
  }, []);

  return <DarkFractionCalculator showFilePanel={false}
    onStateChange={handleStateChange} externalVariables={extVars} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<DemoApp />);
  </script>
</body>
</html>
