<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
  <title>Dark Fraction (live)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { background: #f5f5f5; }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <script src="../../sidebar.js" data-active="calculator-live"></script>
  <script>
    // Sidebar links use ../ (one level up) but this page is two levels deep.
    // Rewrite hrefs so they resolve from /calculator/active/ correctly.
    document.querySelectorAll('#sidebarNav a').forEach(function(a) {
      var h = a.getAttribute('href');
      if (h && h.startsWith('../')) a.setAttribute('href', '../' + h);
    });
  </script>

  <div id="root"></div>
  <script type="text/babel" data-type="module" src="../dark-fraction-core.js"></script>
  <script type="text/babel" data-type="module" src="live-bridge.js"></script>
  <script type="text/babel" data-type="module">
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<LiveCalculator />);
  </script>
</body>
</html>
