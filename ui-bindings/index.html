<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Bindings — Dark Fraction</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; font-family: 'JetBrains Mono', monospace; color: #333; }

    /* --- Sidebar --- */
    .sidebar-hamburger {
      position: fixed; top: 16px; left: 16px; z-index: 1100;
      width: 40px; height: 40px; border: none; background: #fff;
      border-radius: 8px; cursor: pointer; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 5px; box-shadow: 0 1px 4px rgba(0,0,0,.12);
    }
    .sidebar-hamburger span {
      display: block; width: 20px; height: 2px; background: #555;
      border-radius: 2px; transition: transform .25s, opacity .25s;
    }
    .sidebar-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .sidebar-hamburger.open span:nth-child(2) { opacity: 0; }
    .sidebar-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .sidebar-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      z-index: 1000; opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }

    .sidebar-nav {
      position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
      background: #fff; z-index: 1050; padding: 72px 20px 20px;
      transform: translateX(-100%); transition: transform .25s;
      box-shadow: 2px 0 12px rgba(0,0,0,.1);
    }
    .sidebar-nav.open { transform: translateX(0); }

    .sidebar-nav a {
      display: block; padding: 12px 14px; margin-bottom: 4px;
      border-radius: 8px; text-decoration: none; color: #555;
      font-size: 14px; font-weight: 400; transition: background .15s;
    }
    .sidebar-nav a:hover { background: #f0f0f0; }
    .sidebar-nav a.active { background: #A78BFA18; color: #A78BFA; font-weight: 700; border-left: 3px solid #A78BFA; }

    /* --- Page content --- */
    .page-content {
      max-width: 600px; margin: 80px auto; padding: 0 24px; text-align: center;
    }
    .page-content h1 {
      font-size: 28px; font-weight: 700; margin-bottom: 12px; color: #A78BFA;
    }
    .page-content p { color: #888; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <button class="sidebar-hamburger" id="sidebarToggle" aria-label="Open navigation">
    <span></span><span></span><span></span>
  </button>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <nav class="sidebar-nav" id="sidebarNav">
    <a href="../calculator/">Calculator</a>
    <a href="../observatrons/">Observatrons</a>
    <a href="../ui-bindings/" class="active">UI Bindings</a>
  </nav>

  <!-- Page -->
  <div class="page-content">
    <h1>UI Bindings</h1>
    <p>Hello world. This page is under construction.</p>
  </div>

  <script>
  (function() {
    var btn = document.getElementById('sidebarToggle');
    var nav = document.getElementById('sidebarNav');
    var backdrop = document.getElementById('sidebarBackdrop');
    function open()  { btn.classList.add('open'); nav.classList.add('open'); backdrop.classList.add('open'); }
    function close() { btn.classList.remove('open'); nav.classList.remove('open'); backdrop.classList.remove('open'); }
    function toggle() { nav.classList.contains('open') ? close() : open(); }
    btn.addEventListener('click', toggle);
    backdrop.addEventListener('click', close);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') close(); });
  })();
  </script>
</body>
</html>
